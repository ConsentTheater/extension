version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
    ignore:
      # Hold TypeScript major bumps across all ConsentTheater repos (extension,
      # playbill, website) so the fleet stays on the same major. The hard
      # constraint lives in the website — @astrojs/check / @volar/kit don't
      # yet declare peer support for TS 7+ and `astro check` ERESOLVEs on a
      # major skew. Raise the floor manually across all repos in lockstep.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
